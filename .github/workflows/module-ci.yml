# ══════════════════════════════════════════════════════════════════════
# Reusable Workflow — Module CI
# ══════════════════════════════════════════════════════════════════════
# Valida módulos Terraform: fmt, validate, checkov, terraform test.
# Módulos NÃO têm backend nem state — init roda sem backend.
#
# Caller:
#   uses: cbssdigital/digio-tf-workflows/.github/workflows/module-ci.yml@v1
# ══════════════════════════════════════════════════════════════════════
name: "Module CI"

on:
  workflow_call:
    inputs:
      terraform_version:
        description: "Terraform CLI version"
        required: false
        type: string
        default: "1.14.7"
      module_dir:
        description: "Path to the module root (usually .)"
        required: false
        type: string
        default: "."
      checkov_enabled:
        description: "Run Checkov policy scan"
        required: false
        type: boolean
        default: true
      test_enabled:
        description: "Run terraform test (requires .tftest.hcl files)"
        required: false
        type: boolean
        default: true

jobs:
  validate:
    name: "🔍 Validate"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Format Check
        working-directory: ${{ inputs.module_dir }}
        run: terraform fmt -check -recursive -diff

      - name: Terraform Init (no backend)
        working-directory: ${{ inputs.module_dir }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ inputs.module_dir }}
        run: terraform validate

      # ── Checkov ──────────────────────────────────────────────────────
      - name: "🛡️ Checkov — Policy Scan"
        if: inputs.checkov_enabled
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ inputs.module_dir }}
          framework: terraform
          output_format: cli,json
          output_file_path: console,checkov-results.json
          soft_fail: true
          quiet: true

      # ── Terraform Test ───────────────────────────────────────────────
      - name: Check for test files
        if: inputs.test_enabled
        id: check_tests
        run: |
          if find "${{ inputs.module_dir }}" -name "*.tftest.hcl" -o -name "*_test.tf" | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "🧪 Terraform Test"
        if: inputs.test_enabled && steps.check_tests.outputs.has_tests == 'true'
        working-directory: ${{ inputs.module_dir }}
        run: terraform test

      # ── Summary ──────────────────────────────────────────────────────
      - name: "📊 Job Summary"
        if: always()
        run: |
          {
            echo "# 🔍 Module CI"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Format | ✅ |"
            echo "| Init | ✅ |"
            echo "| Validate | ✅ |"
            echo "| Checkov | ${{ inputs.checkov_enabled && '✅' || '⏭️ skipped' }} |"
            echo "| Tests | ${{ inputs.test_enabled && '✅' || '⏭️ skipped' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
