# ══════════════════════════════════════════════════════════════════════
# Reusable Workflow — Module Release
# ══════════════════════════════════════════════════════════════════════
# Cria tag semântica e GitHub Release para módulos Terraform.
# Bump version baseado no input (patch/minor/major) ou auto-detect
# via prefixo do commit (fix: → patch, feat: → minor, breaking: → major).
#
# Caller:
#   uses: jpvieirah/digio-tf-workflows/.github/workflows/module-release.yml@v1
# ══════════════════════════════════════════════════════════════════════
name: "Module Release"

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type (auto, patch, minor, major)"
        required: false
        type: string
        default: "auto"
    outputs:
      version:
        description: "The new version tag created"
        value: ${{ jobs.release.outputs.new_tag }}

permissions:
  contents: write

jobs:
  release:
    name: "🏷️ Release"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$TAG" ]; then
            TAG="v0.0.0"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Determine bump type
        id: bump_type
        env:
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          if [ "$INPUT_BUMP" != "auto" ]; then
            echo "bump=$INPUT_BUMP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-detect from last commit message
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qiE '^breaking|^!:'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^feat'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate new version
        id: bump
        env:
          CURRENT: ${{ steps.latest.outputs.tag }}
          BUMP: ${{ steps.bump_type.outputs.bump }}
        run: |
          # Strip 'v' prefix
          VER="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_TAG ($BUMP bump)"

      - name: Create tag
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
          PREV_TAG: ${{ steps.latest.outputs.tag }}
        with:
          script: |
            const { NEW_TAG, PREV_TAG } = process.env;

            let body = `## Changes since ${PREV_TAG}\n\n`;
            try {
              const { data: commits } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: PREV_TAG === 'v0.0.0' ? (await github.rest.repos.listCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 1,
                  direction: 'asc'
                })).data[0].sha : PREV_TAG,
                head: NEW_TAG,
              });
              body += commits.commits
                .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.slice(0,7)})`)
                .join('\n');
            } catch {
              body += '_First release_';
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: NEW_TAG,
              name: NEW_TAG,
              body,
              draft: false,
              prerelease: false,
            });

      - name: "📊 Summary"
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
          BUMP: ${{ steps.bump_type.outputs.bump }}
        run: |
          {
            echo "# 🏷️ Module Release"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| **Version** | \`$NEW_TAG\` |"
            echo "| **Bump** | $BUMP |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
